<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя візитка</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:linear-gradient(135deg,#09090b,#18181b,#27272a);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:25px;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:28px;
    padding:35px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,.4);
}

.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #3b82f6;
    margin-bottom:20px;
}

h1{
    font-size:32px;
}

h2{
    margin-top:5px;
    color:#60a5fa;
    font-weight:500;
    font-size:18px;
}

p{
    margin:20px 0;
    color:#d4d4d8;
    line-height:1.6;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:25px;
}

.btn{
    text-decoration:none;
    color:white;
    background:#2563eb;
    padding:15px;
    border-radius:14px;
    font-weight:600;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-3px);
    background:#3b82f6;
}

.socials{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:25px;
}

.social{
    text-decoration:none;
    color:white;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    transition:.2s;
}

.social:hover{
    background:#2563eb;
}

footer{
    margin-top:25px;
    color:#71717a;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<img class="avatar" src="avatar.jpg" alt="Фото">

<h1>Ваше Ім'я</h1>
<h2>UX/UI Designer • Web Developer</h2>

<p>
Тут короткий опис про себе.
Наприклад: Створюю сучасні сайти,
дизайн інтерфейсів та цифрові рішення.
</p>

<div class="buttons">

<a class="btn" href="tel:+380000000000">
📞 Подзвонити
</a>

<a class="btn" href="mailto:mail@example.com">
✉️ Email
</a>

<a class="btn" href="https://t.me/username">
💬 Telegram
</a>

<a class="btn" href="contact.vcf">
💾 Зберегти контакт
</a>

</div>

<div class="socials">

<a class="social" href="#">Instagram</a>
<a class="social" href="#">LinkedIn</a>
<a class="social" href="#">GitHub</a>
<a class="social" href="#">Website</a>

</div>

<footer>
Made with ❤️
</footer>

</div>

</body>
</html>
